name: Monitor ANVISA Diario

on:
  schedule:
    # Configurado para rodar todos os dias às 09:00 UTC (06:00 no horário de Brasília)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite que você force a execução manualmente quando quiser

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v3

    - name: Configurar o Python no servidor
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar bibliotecas necessárias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar o Robô de Monitoramento
      env:
        TELEGRAM_TOKEN: ${{ secrets::TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets::TELEGRAM_CHAT_ID }}
      run: python monitor_anvisa.py
